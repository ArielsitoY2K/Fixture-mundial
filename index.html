<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial 2026 - Fixture y Posiciones</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-active {
            border-bottom: 4px solid #10b981;
            color: #10b981;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-gray-800 border-b border-gray-700 py-6 text-center shadow-lg">
        <h1 class="text-3xl font-extrabold tracking-wider text-emerald-400 uppercase">Copa del Mundo FIFA 2026</h1>
        <p class="text-gray-400 text-sm mt-1">Calendario de Partidos y Tablas de Grupos (Vía Backend Seguro)</p>
    </header>

    <div class="max-w-7xl mx-auto px-4 w-full mt-6">
        <div class="flex border-b border-gray-700 justify-center space-x-8">
            <button id="btn-fixture" onclick="switchTab('fixture')" class="py-3 px-6 font-bold text-lg focus:outline-none transition-all tab-active cursor-pointer">
                🏆 Fixture / Partidos
            </button>
            <button id="btn-standings" onclick="switchTab('standings')" class="py-3 px-6 font-bold text-lg focus:outline-none text-gray-400 hover:text-white transition-all cursor-pointer">
                📊 Tablas de Posiciones
            </button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-8 flex-grow w-full">
        
        <div id="loading" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-500 mx-auto"></div>
            <p class="text-gray-400 mt-4">Cargando datos desde nuestro servidor proxy...</p>
        </div>
        
        <div id="error-msg" class="hidden bg-red-950/60 border border-red-700 text-red-200 p-4 rounded-xl text-center mb-6">
            ⚠️ Hubo un problema al procesar la solicitud en el backend.
        </div>

        <section id="section-fixture" class="space-y-6">
            <div class="flex flex-wrap justify-between items-center gap-4 bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-md">
                <h2 class="text-xl font-bold text-emerald-400">Calendario Oficial</h2>
                <select id="filter-stage" onchange="filterMatches()" class="bg-gray-700 text-white border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-emerald-500 cursor-pointer">
                    <option value="all">Ver Todos los Partidos</option>
                    <option value="group">Fase de Grupos</option>
                    <option value="knockout">Fase de Eliminación Directa</option>
                </select>
            </div>

            <div id="fixture-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="section-standings" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>

    </main>

    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-xs text-gray-500 mt-auto">
        <p>Datos protegidos y servidos a través de Vercel Serverless Functions</p>
    </footer>

    <script>
        // Apuntamos a las rutas internas de nuestro backend de Vercel
        const API_FIXTURES_URL = '/api/fixtures';
        const API_STANDINGS_URL = '/api/standings';

        let allMatches = [];
        let allStandings = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchWorldCupData();
        });

        function switchTab(tab) {
            const btnFixture = document.getElementById('btn-fixture');
            const btnStandings = document.getElementById('btn-standings');
            const secFixture = document.getElementById('section-fixture');
            const secStandings = document.getElementById('section-standings');

            if (tab === 'fixture') {
                btnFixture.classList.add('tab-active');
                btnFixture.classList.remove('text-gray-400');
                btnStandings.classList.remove('tab-active');
                btnStandings.classList.add('text-gray-400');
                secFixture.classList.remove('hidden');
                secStandings.classList.add('hidden');
            } else {
                btnStandings.classList.add('tab-active');
                btnStandings.classList.remove('text-gray-400');
                btnFixture.classList.remove('tab-active');
                btnFixture.classList.add('text-gray-400');
                secStandings.classList.remove('hidden');
                secFixture.classList.add('hidden');
            }
        }

        async function fetchWorldCupData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error-msg').classList.add('hidden');
            
            try {
                // Hacemos las peticiones en paralelo a nuestro propio servidor
                const [fixturesRes, standingsRes] = await Promise.all([
                    fetch(API_FIXTURES_URL).then(r => {
                        if (!r.ok) throw new Error(`Backend Fixtures Error (${r.status})`);
                        return r.json();
                    }),
                    fetch(API_STANDINGS_URL).then(r => {
                        if (!r.ok) throw new Error(`Backend Standings Error (${r.status})`);
                        return r.json();
                    })
                ]);

                if (fixturesRes && fixturesRes.data) allMatches = fixturesRes.data;
                if (standingsRes && standingsRes.data) allStandings = standingsRes.data;

                renderFixture(allMatches);
                renderStandings(allStandings);

            } catch (error) {
                console.error(error);
                const errorDiv = document.getElementById('error-msg');
                errorDiv.innerHTML = `⚠️ Error al conectar con el backend: <strong>${error.message}</strong>.`;
                errorDiv.classList.remove('hidden');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderFixture(matches) {
            const container = document.getElementById('fixture-container');
            container.innerHTML = '';

            if (matches.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center col-span-full py-8">No hay partidos disponibles.</p>';
                return;
            }

            matches.forEach(match => {
                const isLive = match.status === 'live';
                const isFinished = match.status === 'finished';
                
                const formattedDate = new Date(match.date).toLocaleDateString('es-ES', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });

                const card = document.createElement('div');
                card.className = `bg-gray-800 border ${isLive ? 'border-emerald-500 ring-2 ring-emerald-500/20' : 'border-gray-700'} rounded-xl p-4 flex flex-col justify-between shadow-md transition-all hover:scale-[1.01]`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-xs font-bold px-2 py-0.5 rounded bg-gray-700 text-emerald-400 uppercase tracking-wider">${match.group_name || match.stage}</span>
                        <span class="text-xs ${isLive ? 'text-emerald-400 font-extrabold animate-pulse' : 'text-gray-400'}">
                            ${isLive ? '• EN VIVO' : isFinished ? 'Finalizado' : formattedDate}
                        </span>
                    </div>
                    <div class="space-y-3 py-1">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <img src="${match.home_team.flag || 'https://placehold.co/40x26/22c55e/ffffff?text=' + match.home_team.name.substring(0,2)}" class="w-6 h-4 object-cover rounded shadow-sm">
                                <span class="font-medium text-gray-200">${match.home_team.name}</span>
                            </div>
                            <span class="text-xl font-bold ${isFinished || isLive ? 'text-white' : 'text-gray-500'}">${match.home_score !== null ? match.home_score : '-'}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <img src="${match.away_team.flag || 'https://placehold.co/40x26/22c55e/ffffff?text=' + match.away_team.name.substring(0,2)}" class="w-6 h-4 object-cover rounded shadow-sm">
                                <span class="font-medium text-gray-200">${match.away_team.name}</span>
                            </div>
                            <span class="text-xl font-bold ${isFinished || isLive ? 'text-white' : 'text-gray-500'}">${match.away_score !== null ? match.away_score : '-'}</span>
                        </div>
                    </div>
                    <div class="mt-3 pt-2 border-t border-gray-700/60 text-left">
                        <p class="text-[11px] text-gray-500 truncate">📍 ${match.venue || 'Estadio por confirmar'}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterMatches() {
            const criteria = document.getElementById('filter-stage').value;
            if (criteria === 'all') {
                renderFixture(allMatches);
            } else if (criteria === 'group') {
                renderFixture(allMatches.filter(m => m.stage.toLowerCase().includes('group') || m.group_name));
            } else if (criteria === 'knockout') {
                renderFixture(allMatches.filter(m => !m.stage.toLowerCase().includes('group') && !m.group_name));
            }
        }

        function renderStandings(standings) {
            const container = document.getElementById('section-standings');
            container.innerHTML = '';

            if (standings.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center col-span-full py-8">No hay tablas de posiciones disponibles.</p>';
                return;
            }

            standings.forEach(group => {
                const groupCard = document.createElement('div');
                groupCard.className = "bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-lg";
                
                let tbodyRows = '';
                group.teams.forEach((team, index) => {
                    const rowHighlight = index < 2 ? 'bg-emerald-950/20 text-emerald-300' : 'text-gray-300';
                    
                    tbodyRows += `
                        <tr class="border-b border-gray-700/40 hover:bg-gray-700/30 transition ${rowHighlight}">
                            <td class="px-2 py-2 text-center text-xs font-bold">${index + 1}</td>
                            <td class="px-2 py-2 flex items-center space-x-2">
                                <img src="${team.flag || 'https://placehold.co/40x26/22c55e/ffffff?text=' + team.name.substring(0,2)}" class="w-5 h-3.5 object-cover rounded shadow-xs">
                                <span class="truncate font-medium">${team.name}</span>
                            </td>
                            <td class="px-2 py-2 text-center font-semibold text-gray-100">${team.played}</td>
                            <td class="px-2 py-2 text-center text-xs font-semibold">${team.goal_difference >= 0 ? '+' + team.goal_difference : team.goal_difference}</td>
                            <td class="px-2 py-2 text-center font-bold text-white">${team.points}</td>
                        </tr>
                    `;
                });

                groupCard.innerHTML = `
                    <h3 class="text-base font-extrabold text-emerald-400 border-b border-gray-700 pb-2 mb-2 uppercase tracking-wider">${group.group_name}</h3>
                    <table class="w-full text-xs text-left">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-700 uppercase bg-gray-900/40">
                                <th class="px-2 py-2 text-center w-8">#</th>
                                <th class="px-2 py-2">Equipo</th>
                                <th class="px-2 py-2 text-center w-8" title="Partidos Jugados">PJ</th>
                                <th class="px-2 py-2 text-center w-8" title="Diferencia de Goles">DG</th>
                                <th class="px-2 py-2 text-center w-8 text-emerald-400">Pts</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tbodyRows}
                        </tbody>
                    </table>
                `;
                container.appendChild(groupCard);
            });
        }
    </script>
</body>
</html>
